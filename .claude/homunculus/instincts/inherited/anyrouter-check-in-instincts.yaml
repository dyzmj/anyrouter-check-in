# Anyrouter Check In Workflow Add Or Enhance Login Method

## Action

Follow the add-or-enhance-login-method workflow:
1. Update checkin.py to implement or modify login logic.
2. Modify utils/browser.py and/or utils/popups.py to handle new login UI flows, selectors, or modal dialogs.
3. Adjust utils/config.py if new config options are needed (e.g., toggling login methods, proxy usage).
4. Update .env.example to document new config variables.
5. Edit .github/workflows/checkin.yml if CI needs to support the new login method (e.g., secrets, environment variables, debug artifacts).
6. Update README.md or documentation if user-facing changes are made.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: checkin.py, utils/browser.py, utils/popups.py

